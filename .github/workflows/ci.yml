      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.ID }}'
          path: '${{ github.workspace }}\bin\Riverside.MediaRecording\${{ env.CONFIGURATION }}\${{ env.TFM }}'

