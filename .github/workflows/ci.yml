name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  WORKING_DIR: ${{ github.workspace }}
  GLOBAL_JSON_PATH: '${{ github.workspace }}\global.json'
  SOLUTION_PATH: '${{ github.workspace }}\Elapsed.slnx'
  APP_PROJECT_PATH: '${{ github.workspace }}\src\platforms\Riverside.Elapsed.App\Riverside.Elapsed.App.csproj'
  CLI_PROJECT_PATH: '${{ github.workspace }}\src\platforms\Riverside.Elapsed.CommandLine\Riverside.Elapsed.CommandLine.csproj'
  API_PROJECT_PATH: '${{ github.workspace }}\src\core\Riverside.Elapsed\Riverside.Elapsed.csproj'
  TUS_PROJECT_PATH: '${{ github.workspace }}\src\core\Riverside.ResumableUploads\Riverside.ResumableUploads.csproj'
  MEDIA_PROJECT_PATH: '${{ github.workspace }}\src\core\Riverside.MediaRecording\Riverside.MediaRecording.csproj'

jobs:
  formatting:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Install XAML Styler
        run: 'dotnet tool install --global XamlStyler.Console'

      - name: Check XAML formatting
        id: check-step
        run: |
          $changedFiles = (git diff --diff-filter=d --name-only HEAD~1) -split "\n" | Where-Object {$_ -like "*.xaml"}
          foreach ($file in $changedFiles)
          {
            xstyler -p -l None -f $file
            if ($LASTEXITCODE -ne 0)
            {
              echo "::error file=$file::Format check failed"
            }
          }
        continue-on-error: true

      - name: Fail if necessary
        if: steps.check-step.outcome == 'failure'
        run: exit 1

  app:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        project: [App]
        targetFramework: [net10.0-windows10.0.26100.0, net10.0-desktop, net10.0-android, net10.0-ios, net10.0-browserwasm]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      TFM: ${{ matrix.targetFramework }}
      ID: runtime.app.${{ matrix.project }}.${{ matrix.targetFramework }}.Environment-${{ matrix.configuration }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        uses: "./.github/install_dependencies"
        with:
          target-platform: ${{ matrix.platform }}
          dotnet-version: 10.0.102
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore .NET workloads
        shell: pwsh
        run: |
          dotnet workload restore $env:APP_PROJECT_PATH

      - name: Restore
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION

      - name: Build
        if: contains(matrix.targetFramework, 'ios')
        run: |
          msbuild $env:APP_PROJECT_PATH `
            -t:Build `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION `
            -p:TargetFramework=$env:TFM

      - name: Build & publish
        if: contains(matrix.targetFramework, 'ios') == false
        run: |
          msbuild $env:APP_PROJECT_PATH `
            -t:Publish `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION `
            -p:TargetFramework=$env:TFM

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.ID }}'
          path: '${{ github.workspace }}\bin\Riverside.Elapsed.App\${{ env.CONFIGURATION }}\${{ env.TFM }}'

  cli:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: true
      matrix:
        configuration: [Debug, Release]
        project: [CommandLine]
        targetFramework: [net10.0]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      TFM: ${{ matrix.targetFramework }}
      ID: runtime.cli.${{ matrix.project }}.${{ matrix.targetFramework }}.Environment-${{ matrix.configuration }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        uses: "./.github/install_dependencies"
        with:
          dotnet-version: 10.0.102
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore .NET workloads
        shell: pwsh
        run: dotnet workload restore $env:APP_PROJECT_PATH

      - name: Restore
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION

      - name: Build & publish
        run: |
          msbuild $env:CLI_PROJECT_PATH `
            -t:Publish `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION `
            -p:TargetFramework=$env:TFM

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.ID }}'
          path: '${{ github.workspace }}\bin\Riverside.Elapsed.CommandLine\${{ env.CONFIGURATION }}\${{ env.TFM }}'

  api:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: true
      matrix:
        configuration: [Debug, Release]
        project: [Elapsed]
        targetFramework: [netstandard2.1]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      TFM: ${{ matrix.targetFramework }}
      ID: runtime.api.${{ matrix.project }}.${{ matrix.targetFramework }}.Environment-${{ matrix.configuration }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        uses: "./.github/install_dependencies"
        with:
          dotnet-version: 10.0.102
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore .NET workloads
        shell: pwsh
        run: dotnet workload restore $env:APP_PROJECT_PATH

      - name: Restore
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION

      - name: Build & publish
        run: |
          msbuild $env:API_PROJECT_PATH `
            -t:Publish `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION `
            -p:TargetFramework=$env:TFM

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.ID }}'
          path: '${{ github.workspace }}\bin\Riverside.Elapsed\${{ env.CONFIGURATION }}\${{ env.TFM }}'

  tus:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: true
      matrix:
        configuration: [Debug, Release]
        project: [ResumableUploads]
        targetFramework: [netstandard2.1]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      TFM: ${{ matrix.targetFramework }}
      ID: runtime.tus.${{ matrix.project }}.${{ matrix.targetFramework }}.Environment-${{ matrix.configuration }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        uses: "./.github/install_dependencies"
        with:
          dotnet-version: 10.0.102
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION

      - name: Build & publish
        run: |
          msbuild $env:TUS_PROJECT_PATH `
            -t:Publish `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION `
            -p:TargetFramework=$env:TFM

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.ID }}'
          path: '${{ github.workspace }}\bin\Riverside.ResumableUploads\${{ env.CONFIGURATION }}\${{ env.TFM }}'

  media:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: true
      matrix:
        configuration: [Debug, Release]
        project: [MediaRecording]
        targetFramework: [netstandard2.1]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      TFM: ${{ matrix.targetFramework }}
      ID: runtime.media.${{ matrix.project }}.${{ matrix.targetFramework }}.Environment-${{ matrix.configuration }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        uses: "./.github/install_dependencies"
        with:
          dotnet-version: 10.0.102
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform="Any CPU" `
            -p:Configuration=$env:CONFIGURATION

      - name: Build & publish
        run: |
          msbuild $env:MEDIA_PROJECT_PATH `
            -t:Publish `
            -p:Platform="Any CPU" `
